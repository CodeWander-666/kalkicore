<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>⚡ Kalki Worker – Earn Points</title>
  <style>
    body { font-family: system-ui; max-width: 600px; margin: 2em auto; padding: 1em; }
    .card { border: 1px solid #ddd; padding: 1.5em; border-radius: 12px; margin-bottom: 1em; }
    .points { font-size: 1.5em; font-weight: bold; color: #2563eb; }
    button { padding: 0.8em 1.4em; font-size: 1em; border: none; background: #059669; color: white; border-radius: 8px; cursor: pointer; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .log { font-size: 0.85em; color: #555; margin-top: 1em; }
  </style>
</head>
<body>
  <h1>⚡ Kalki Worker</h1>
  <div class="card">
    <p>Share idle GPU → earn points → redeem for AI priority.</p>
    <p class="points" id="points-display">0 points</p>
    <button id="start-btn" onclick="startWorker()">Start Sharing GPU</button>
    <button id="stop-btn" onclick="stopWorker()" disabled>Stop</button>
    <div class="log" id="log"></div>
  </div>
  <script type="module" src="assets/worker.js"></script>
</body>
</html>

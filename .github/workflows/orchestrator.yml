name: Kalki Orchestrator
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  orchestrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Run orchestrator
        run: python3 process.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Orchestrator update'
          file_pattern: 'tasks.json'

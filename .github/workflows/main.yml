name: Daily Blog Post 

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Check if requirements.txt exists in root
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            # Try to find it in scripts folder
            if [ -f scripts/requirements.txt ]; then
              pip install -r scripts/requirements.txt
            else
              echo "❌ No requirements.txt found"
              exit 1
            fi
          fi

      - name: Run blog generator
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: python scripts/generate_blog.py

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add blog/ blog_generator.log
          git diff --quiet && git diff --staged --quiet || git commit -m "📝 Add daily blog post [skip ci]"
          git push

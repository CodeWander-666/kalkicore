name: Daily Blog Post Generator

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # DEBUG: Show repository structure
      - name: Debug - list files
        run: |
          echo "Root directory:"
          ls -la
          echo "scripts directory:"
          ls -la scripts/ || echo "No scripts folder"
          echo "requirements.txt content:"
          cat requirements.txt || echo "requirements.txt missing"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # DEBUG: Confirm installation
      - name: Verify installed packages
        run: pip list

      - name: Run blog generator
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: python scripts/generate_blog.py

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add blog/ blog_generator.log
          git diff --quiet && git diff --staged --quiet || git commit -m "📝 Add daily blog post [skip ci]"
          git push
      - name: Check for changes
        id: git-check
        run: |
          git add blog/ blog_generator.log
          git diff --staged --quiet || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -m "📝 Add daily blog post for $(date +'%Y-%m-%d') [skip ci]"
          git push

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Blog generation failed. Check the Actions logs for details."
          # You can extend this to send a Telegram message, create a GitHub issue, etc.

<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Redirecting…</title>
<script>
(function(l){
  var s = l.search;
  if(s && s[0]==='?'){
    l.search = s.slice(1);
    return;
  }
  var p = [], segs = l.pathname.split('/');
  if(segs.length > 1){
    p = segs.slice(1).filter(function(v){return v.length>0;});
    var q = {};
    l.search.slice(1).split('&').forEach(function(pair){
      var kv = pair.split('=');
      if(kv[0]) q[kv[0]] = kv[1]||'';
    });
    l.replace(l.origin + '/?/' + p.join('/') + '&' +
      Object.keys(q).map(function(k){return k+'~and~'+q[k];}).join('&') +
      l.hash);
  }
}(window.location))
</script></head><body></body></html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ Kalki Chat – Universal AI</title>
  <style>
    :root { --primary: #2563eb; --success: #059669; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); max-width: 800px; margin: 2em auto; padding: 1em; }
    h1 { margin-bottom: 0.2em; }
    .card { background: var(--card); border-radius: 16px; padding: 1.5em; margin-bottom: 1.2em; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .points-badge { display: inline-flex; align-items: center; background: var(--primary); color: white; border-radius: 20px; padding: 0.2em 1em; font-size: 0.9em; margin-left: 1em; }
    .status-line { font-size: 0.9em; color: #475569; margin: 0.5em 0; }
    .chatbox { height: 400px; border: 1px solid #e2e8f0; overflow-y: auto; padding: 1em; background: white; border-radius: 12px; margin-bottom: 1em; }
    .msg { margin-bottom: 0.8em; }
    .user { color: var(--primary); }
    .bot { color: var(--success); }
    input[type="text"] { width: 100%; padding: 0.7em; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 1em; }
    button { padding: 0.7em 1.5em; font-size: 1em; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-send { background: var(--primary); color: white; }
    .log-area { background: #1e293b; color: #e2e8f0; padding: 1em; border-radius: 12px; font-family: monospace; font-size: 0.8em; max-height: 250px; overflow-y: auto; white-space: pre-wrap; }
    a { color: var(--primary); }
  </style>
</head>
<body>
  <h1>⚡ Kalki Chat</h1>
  <div class="card">
    <div style="display:flex; align-items:center; justify-content: space-between;">
      <div>
        <span class="status-line" id="detected-hardware">Detecting hardware…</span>
      </div>
      <div id="points-display" class="points-badge" style="display:none;">🪙 <span id="points-value">0</span></div>
    </div>
    <div id="model-status" class="status-line">Loading model…</div>
    <div id="worker-msg" class="status-line" style="display:none;"></div>
  </div>

  <div class="chatbox" id="chatbox"></div>
  <div style="display:flex; gap:0.5em;">
    <input type="text" id="user-input" placeholder="Ask something…" disabled>
    <button class="btn-send" id="send-btn" disabled>Send</button>
  </div>

  <div class="card" id="log-card">
    <h3>📋 System Log</h3>
    <div class="log-area" id="logbox"></div>
  </div>

  <script type="module" src="assets/chat.js"></script>
</body>
</html>

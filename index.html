<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kalki Intelligence – Unlimited AI with node-powered reasoning">
  <title>⚡ Kalki Intelligence</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!‑‑ Navigation bar ‑‑>
  <nav id="topbar">
    <span id="logo">⚡ Kalki</span>
    <div id="nav-buttons">
      <button id="btn-chat" class="nav-btn active">💬 Chat</button>
      <button id="btn-node" class="nav-btn">🖥️ Become a Node</button>
    </div>
    <div id="points-badge">🪙 <span id="pts-val">0</span> pts</div>
  </nav>

  <!‑‑ CHAT VIEW ‑‑>
  <main id="view-chat" class="view active">
    <div id="hardware-bar">🖥️ <span id="hw-info">Detecting hardware…</span></div>
    <div id="thinking-bar" style="display:none;">
      <div id="thinking-nodes"></div>
    </div>
    <div id="chatbox"></div>
    <div id="input-area">
      <input type="text" id="user-input" placeholder="Ask anything…" disabled>
      <button id="send-btn" disabled>Send</button>
      <button id="clear-btn" title="Clear history">🗑️</button>
    </div>
    <div id="status-line">Loading model…</div>
  </main>

  <!‑‑ NODE DASHBOARD VIEW ‑‑>
  <main id="view-node" class="view">
    <div class="card">
      <h2>🖥️ Your Node</h2>
      <div class="specs-grid" id="node-specs">
        <div><strong>Device:</strong> <span id="spec-device">—</span></div>
        <div><strong>CPU Cores:</strong> <span id="spec-cpu">—</span></div>
        <div><strong>GPU:</strong> <span id="spec-gpu">—</span></div>
        <div><strong>Memory:</strong> <span id="spec-ram">—</span></div>
        <div><strong>Tier:</strong> <span id="spec-tier">—</span></div>
      </div>
    </div>
    <div class="card">
      <h2>🪙 Points & Tokens</h2>
      <div class="points-large" id="node-points">0</div>
      <div class="specs-grid">
        <div><strong>Total Earned:</strong> <span id="spec-earned">0</span></div>
        <div><strong>Tokens Used:</strong> <span id="spec-tokens">0</span></div>
        <div><strong>Tokens Served:</strong> <span id="spec-served">0</span></div>
        <div><strong>Status:</strong> <span id="spec-status" class="badge idle">IDLE</span></div>
      </div>
      <button id="btn-start-node" class="btn-primary">▶ Start Sharing GPU</button>
      <button id="btn-stop-node" class="btn-danger" disabled>⏹ Stop</button>
    </div>
    <div class="card">
      <h2>📋 Activity Log</h2>
      <div class="log-box" id="node-log">Waiting for node start…</div>
    </div>
  </main>

  <!‑‑ Scripts ‑‑>
  <script src="https://cdn.jsdelivr.net/npm/dexie@4/dist/dexie.min.js"></script>
  <script type="module" src="js/kalki.js"></script>
</body>
</html>

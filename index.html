<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>⚡ Kalki Chat – Unlimited AI</title>
  <style>
    body { font-family: system-ui; max-width: 780px; margin: 2em auto; padding: 0 1em; }
    #chatbox { height: 400px; border: 1px solid #ccc; overflow-y: auto; padding: 1em; background: #f9f9f9; border-radius: 8px; margin-bottom: 1em; }
    .msg { margin-bottom: 0.8em; }
    .user { color: #2563eb; }
    .bot { color: #059669; }
    .status { color: #666; font-size: 0.9em; }
    input[type="text"] { width: 100%; padding: 0.8em; font-size: 1em; border: 1px solid #ccc; border-radius: 8px; }
    button { padding: 0.8em 1.4em; font-size: 1em; border: none; background: #2563eb; color: white; border-radius: 8px; cursor: pointer; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #model-status { margin-bottom: 0.5em; }
  </style>
</head>
<body>
  <h1>⚡ Kalki Chat</h1>
  <div id="model-status" class="status">Loading model (first visit downloads ~1 GB) …</div>
  <div id="chatbox"></div>
  <div style="display:flex; gap:0.5em;">
    <input type="text" id="user-input" placeholder="Ask anything…" disabled>
    <button id="send-btn" disabled>Send</button>
  </div>
  <p class="status">100% browser‑side AI · No server · Unlimited tokens</p>
  <script type="module" src="assets/chat.js"></script>
</body>
</html>
